<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiFi Dashboard - Hotel & Resident</title>
<!-- Lao font: Phetsarath OT | English font: Times New Roman -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Phetsarath&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#0b1220;
  --bg-1:#0e1626;
  --bg-2:#121b2e;
  --bg-3:#16213a;
  --border:#22304a;
  --border-soft:#1c2942;
  --text-0:#eef2f9;
  --text-1:#aab6cc;
  --text-2:#76849f;
  --blue:#3b82f6;
  --blue-dark:#2563eb;
  --green:#22c55e;
  --green-dark:#16a34a;
  --amber:#f59e0b;
  --amber-dark:#d97706;
  --red:#ef4444;
  --purple:#a855f7;
  --purple-dark:#9333ea;
  --radius-lg:16px;
  --radius-md:12px;
  --radius-sm:8px;
  --shadow-card:0 4px 18px rgba(0,0,0,.35);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;overflow-x:hidden;max-width:100vw;}
body{
  background:radial-gradient(circle at 15% 0%, #14213a 0%, var(--bg-0) 45%) fixed;
  color:var(--text-0);
  /* Lao text: Phetsarath OT | English/Numbers: Times New Roman */
  font-family:"Phetsarath OT","Phetsarath","Times New Roman",Times,serif;
  min-height:100vh;
}
/* Override: English/numeric contexts use Times New Roman */
.code-link, thead th, .date-pill, .kpi-value, .avg-value, .summary-box .num,
.badge-num, input[type="number"], .report-doc table td:nth-child(n+6),
.report-doc table th:nth-child(n+6) {
  font-family:"Times New Roman",Times,serif;
}

button{font-family:inherit;}
input,select,textarea{font-family:inherit;}
a{color:inherit;text-decoration:none;}

/* ---------- Layout shell ---------- */
.app{
  display:grid;
  grid-template-columns:240px 1fr 380px;
  min-height:100vh;
}
.app.app-2col{
  grid-template-columns:240px 1fr;
}
.app.login-mode{
  grid-template-columns:1fr !important;
}
@media (max-width:1400px){
  .app{grid-template-columns:220px 1fr 340px;}
  .app.app-2col{grid-template-columns:220px 1fr;}
}

/* ---------- Sidebar ---------- */
.sidebar{
  background:var(--bg-1);
  border-right:1px solid var(--border-soft);
  padding:20px 14px;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  padding:6px 8px 22px;
}
.brand-icon{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#3b82f6,#60a5fa);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.brand-title{font-size:15px;font-weight:700;color:var(--text-0);line-height:1.2;}
.brand-sub{font-size:11px;color:var(--text-2);margin-top:2px;}

.nav-group{margin-bottom:18px;}
.nav-label{
  font-size:11px;
  color:var(--text-2);
  text-transform:uppercase;
  letter-spacing:.04em;
  padding:6px 10px 8px;
}
.nav-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-radius:var(--radius-sm);
  font-size:13.5px;
  color:var(--text-1);
  cursor:pointer;
  margin-bottom:2px;
  transition:background .2s ease,color .2s ease,transform .15s ease,box-shadow .2s ease;
  white-space:nowrap;
}
.nav-item:hover{
  background:var(--bg-3);color:var(--text-0);
  transform:translateX(3px);
  box-shadow:inset 3px 0 0 rgba(59,130,246,.6), 0 0 12px rgba(59,130,246,.12);
}
.nav-item.active{
  background:rgba(59,130,246,.16);
  color:#7eb0ff;
  font-weight:600;
}
.nav-item .ic{width:18px;text-align:center;flex-shrink:0;opacity:.9;}
.sidebar-foot{
  margin-top:auto;
  font-size:11px;
  color:var(--text-2);
  padding:14px 10px 4px;
  border-top:1px solid var(--border-soft);
}

/* ---------- Topbar ---------- */
.topbar{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:14px;
  padding:16px 24px;
  border-bottom:1px solid var(--border-soft);
}
.topbar-left{margin-right:auto;display:flex;align-items:center;gap:14px;}
.burger{
  width:36px;height:36px;border-radius:var(--radius-sm);
  background:var(--bg-2);border:1px solid var(--border-soft);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text-1);
  transition:background .2s ease,color .2s ease,transform .15s ease,box-shadow .2s ease,border-color .2s ease;
}
.burger:hover{
  background:var(--bg-3);color:var(--text-0);transform:translateY(-2px);
  box-shadow:0 6px 16px rgba(59,130,246,.2);border-color:rgba(59,130,246,.4);
}
.icon-btn{
  width:38px;height:38px;border-radius:var(--radius-sm);
  background:var(--bg-2);border:1px solid var(--border-soft);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text-1);
  transition:background .2s ease,color .2s ease,transform .15s ease,box-shadow .2s ease,border-color .2s ease;
  flex-shrink:0;
}
.icon-btn:hover{
  background:var(--bg-3);color:var(--text-0);transform:translateY(-2px);
  box-shadow:0 6px 16px rgba(59,130,246,.2);border-color:rgba(59,130,246,.4);
}
.date-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--bg-2);border:1px solid var(--border-soft);
  border-radius:var(--radius-sm);
  padding:8px 14px;
  font-size:13px;color:var(--text-1);
  flex-shrink:0;
  white-space:nowrap;
  font-family:"Times New Roman",Times,serif;
}
.conn-badge{
  display:flex;align-items:center;gap:6px;
  border-radius:var(--radius-sm);
  padding:8px 12px;font-size:11.5px;font-weight:700;
  flex-shrink:0;white-space:nowrap;cursor:default;
}
.conn-badge.conn-ok{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.35);color:#86efac;}
.conn-badge.conn-bad{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);color:#fca5a5;}
.profile{
  display:flex;align-items:center;gap:10px;
  padding:4px 6px;border-radius:var(--radius-sm);
  cursor:pointer;
  flex-shrink:0;
}
.profile:hover{background:var(--bg-2);}
.avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,#f59e0b,#fbbf24);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;color:#1a1206;font-size:14px;flex-shrink:0;
}
.profile-name{font-size:13px;font-weight:600;color:var(--text-0);line-height:1.2;white-space:nowrap;}
.profile-role{font-size:11px;color:var(--text-2);white-space:nowrap;}

/* ---------- Main content ---------- */
.main{padding:20px 24px 40px;min-width:0;}

.kpi-row{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  margin-bottom:18px;
}
@media (max-width:1100px){.kpi-row{grid-template-columns:repeat(2,1fr);}}

.kpi-card{
  background:var(--bg-2);
  border:1px solid var(--border-soft);
  border-radius:var(--radius-lg);
  padding:16px 18px;
  display:flex;
  align-items:center;
  gap:14px;
  box-shadow:var(--shadow-card);
  position:relative;
  overflow:hidden;
  transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;
}
.kpi-card:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 26px rgba(0,0,0,.4), 0 0 0 1px rgba(59,130,246,.25), 0 0 20px rgba(59,130,246,.12);
  border-color:rgba(59,130,246,.35);
}
.kpi-icon{
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:20px;
  box-shadow:0 0 0 6px rgba(255,255,255,.03);
}
.kpi-icon.blue{background:radial-gradient(circle at 30% 30%,#5b9bff,#2563eb);}
.kpi-icon.green{background:radial-gradient(circle at 30% 30%,#34e08a,#16a34a);}
.kpi-icon.amber{background:radial-gradient(circle at 30% 30%,#ffd166,#d97706);}
.kpi-icon.purple{background:radial-gradient(circle at 30% 30%,#c084fc,#9333ea);}
.kpi-label{font-size:12.5px;color:var(--text-1);margin-bottom:2px;}
.kpi-value{font-size:26px;font-weight:800;color:var(--text-0);line-height:1.1;font-family:"Times New Roman",Times,serif;}
.kpi-value .unit{font-size:13px;font-weight:500;color:var(--text-1);margin-left:4px;font-family:"Phetsarath OT","Phetsarath","Times New Roman",serif;}
.kpi-delta{font-size:11.5px;margin-top:4px;display:flex;align-items:center;gap:4px;}
.kpi-delta.up{color:var(--green);}
.kpi-delta.down{color:var(--text-2);}
.kpi-label-amber{color:var(--amber);}

/* ---------- Generic panel ---------- */
.panel{
  background:var(--bg-2);
  border:1px solid var(--border-soft);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-card);
}
.panel-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px;
  border-bottom:1px solid var(--border-soft);
  gap:10px;flex-wrap:wrap;
}
.panel-title{
  display:flex;align-items:center;gap:8px;
  font-size:14.5px;font-weight:700;color:var(--text-0);
}
.panel-title .ic{font-size:15px;}
.panel-actions{display:flex;gap:8px;flex-wrap:wrap;}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12.5px;font-weight:600;
  padding:8px 14px;border-radius:9px;
  border:1px solid var(--border-soft);
  background:var(--bg-3);color:var(--text-1);
  cursor:pointer;
  transition:filter .15s ease, transform .15s ease, box-shadow .2s ease, border-color .2s ease;
  white-space:nowrap;
  font-family:inherit;
}
.btn:hover{
  filter:brightness(1.15);
  transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(59,130,246,.18), 0 0 0 1px rgba(59,130,246,.25);
  border-color:rgba(59,130,246,.5);
}
.btn:active{transform:translateY(0) scale(.97);box-shadow:none;}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#2563eb);border-color:#2563eb;color:#fff;}
.btn-primary:hover{
  box-shadow:0 6px 22px rgba(59,130,246,.45), 0 0 0 1px rgba(96,165,250,.5), 0 0 24px rgba(59,130,246,.25);
  border-color:#60a5fa;
}
.btn-ghost{background:transparent;}
.btn-sm{padding:5px 10px;font-size:11.5px;border-radius:7px;}
.btn-danger{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.35);color:#fca5a5;}
.btn-danger:hover{
  box-shadow:0 6px 18px rgba(239,68,68,.3), 0 0 0 1px rgba(239,68,68,.4), 0 0 20px rgba(239,68,68,.2);
  border-color:rgba(239,68,68,.6);
}
.btn-full{width:100%;justify-content:center;padding:13px;font-size:14px;}

/* ---------- Tables row ---------- */
.tables-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin-bottom:16px;
}
@media (max-width:1300px){.tables-row{grid-template-columns:1fr;}}

.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
thead th{
  text-align:left;
  color:var(--text-2);
  font-weight:600;
  font-size:11.5px;
  padding:10px 10px;
  border-bottom:1px solid var(--border-soft);
  white-space:nowrap;
  font-family:"Times New Roman",Times,serif;
}
tbody td{
  padding:10px 10px;
  border-bottom:1px solid var(--border-soft);
  color:var(--text-1);
  white-space:nowrap;
}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--bg-3);}
.code-link{color:#7eb0ff;font-weight:600;cursor:pointer;font-family:"Times New Roman",Times,serif;}
.code-link:hover{text-decoration:underline;}
.status-dot{
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#fff;
}
.status-dot.ok{background:var(--green);}
.status-dot.issue{background:var(--amber);}
.status-dot.closed{background:var(--red);}
.row-actions{display:flex;gap:6px;}
.icon-mini{
  width:24px;height:24px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg-3);border:1px solid var(--border-soft);
  cursor:pointer;font-size:11px;color:var(--text-1);
}
.icon-mini:hover{filter:brightness(1.3);}
.icon-mini.del:hover{color:#fca5a5;border-color:rgba(239,68,68,.4);}

.table-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px;font-size:12px;color:var(--text-2);
}
.pager{display:flex;align-items:center;gap:6px;}
.pager-btn{
  width:26px;height:26px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg-3);border:1px solid var(--border-soft);
  cursor:pointer;color:var(--text-1);font-size:12px;
}
.pager-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.pager-btn:disabled{opacity:.4;cursor:not-allowed;}
.search-box{
  display:flex;align-items:center;gap:6px;
  background:var(--bg-3);border:1px solid var(--border-soft);
  border-radius:8px;padding:6px 10px;font-size:12px;
  width:150px;
}
.search-box input{
  background:transparent;border:none;outline:none;color:var(--text-0);
  font-size:12px;width:100%;font-family:inherit;
}
.search-box input::placeholder{color:var(--text-2);}

/* ---------- Charts row ---------- */
.charts-row{
  display:grid;
  grid-template-columns:1.4fr 1fr 1fr;
  gap:16px;
  margin-bottom:16px;
}
@media (max-width:1300px){.charts-row{grid-template-columns:1fr;}}
.chart-body{padding:16px 18px;}
.legend-row{display:flex;gap:18px;align-items:center;font-size:11.5px;color:var(--text-1);}
.legend-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px;}
.select-mini{
  background:var(--bg-3);border:1px solid var(--border-soft);
  color:var(--text-1);font-size:11.5px;border-radius:7px;
  padding:6px 10px;cursor:pointer;font-family:inherit;
}

.donut-wrap{display:flex;align-items:center;gap:18px;justify-content:center;}
.donut-legend{display:flex;flex-direction:column;gap:10px;font-size:12px;}
.donut-legend-item{display:flex;align-items:center;gap:8px;color:var(--text-1);}
.donut-legend-item b{color:var(--text-0);}

/* ---------- Bottom row ---------- */
.bottom-row{
  display:grid;
  grid-template-columns:1.3fr 1fr;
  gap:16px;
}
@media (max-width:1300px){.bottom-row{grid-template-columns:1fr;}}
.bar-item{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:12.5px;}
.bar-item:last-child{margin-bottom:0;}
.bar-rank{width:170px;color:var(--text-1);flex-shrink:0;}
.bar-track{flex:1;height:9px;background:var(--bg-3);border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#f87171,#ef4444);}
.bar-count{width:60px;text-align:right;color:var(--text-2);flex-shrink:0;font-size:11.5px;}

.avg-grid{display:grid;grid-template-columns:repeat(3,1fr) auto;gap:14px;padding:18px;align-items:center;}
@media (max-width:1300px){.avg-grid{grid-template-columns:repeat(2,1fr);}}
.avg-item{display:flex;align-items:center;gap:10px;}
.avg-icon{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
}
.avg-value{font-size:19px;font-weight:800;color:var(--text-0);font-family:"Times New Roman",Times,serif;}
.avg-label{font-size:11px;color:var(--text-2);}
.avg-cta{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  background:var(--bg-3);border:1px solid var(--border-soft);border-radius:12px;
  padding:14px;cursor:pointer;font-size:11px;color:var(--text-1);text-align:center;
  height:100%;
}
.avg-cta:hover{filter:brightness(1.2);}

/* ---------- Right form panel ---------- */
.form-panel{
  border-left:1px solid var(--border-soft);
  background:var(--bg-1);
  padding:20px 22px 60px;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.form-title{
  display:flex;align-items:center;gap:8px;
  font-size:15px;font-weight:700;margin-bottom:18px;color:var(--text-0);
}
.field{margin-bottom:16px;}
.field label{
  display:block;font-size:12.5px;color:var(--text-1);margin-bottom:7px;font-weight:600;
}
.field label .req{color:var(--red);margin-left:2px;}
.field-readonly{
  background:var(--bg-3);border:1px solid var(--border-soft);border-radius:9px;
  padding:11px 13px;font-size:13px;color:var(--text-0);
  font-family:"Times New Roman",Times,serif;
}
.input{
  width:100%;
  background:var(--bg-3);border:1px solid var(--border-soft);border-radius:9px;
  padding:11px 13px;font-size:13px;color:var(--text-0);outline:none;
  font-family:inherit;
}
.input:focus{border-color:var(--blue);}
.input::placeholder{color:var(--text-2);}
select.input{appearance:none;cursor:pointer;}
textarea.input{resize:vertical;min-height:70px;}

.toggle-pair{display:flex;gap:8px;}
.toggle-btn{
  flex:1;text-align:center;padding:11px 0;border-radius:9px;
  border:1px solid var(--border-soft);background:var(--bg-3);
  color:var(--text-1);font-size:13px;font-weight:600;cursor:pointer;
}
.toggle-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}

/* *** Room number field *** */
.room-input-wrap{position:relative;}
.room-input-wrap .room-prefix{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--text-2);font-size:12px;pointer-events:none;font-family:"Times New Roman",Times,serif;
}

.stepper{display:flex;align-items:stretch;}
.stepper .input{text-align:center;border-radius:0;border-left:none;border-right:none;font-family:"Times New Roman",Times,serif;}
.stepper-btn{
  width:42px;display:flex;align-items:center;justify-content:center;
  background:var(--bg-3);border:1px solid var(--border-soft);cursor:pointer;
  font-size:16px;color:var(--text-1);user-select:none;
  transition:background .2s ease,color .2s ease,box-shadow .2s ease;
}
.stepper-btn:first-child{border-radius:9px 0 0 9px;}
.stepper-btn:last-child{border-radius:0 9px 9px 0;}
.stepper-btn:hover{
  background:var(--bg-2);color:var(--text-0);
  box-shadow:inset 0 0 0 1px rgba(59,130,246,.5), 0 0 10px rgba(59,130,246,.15);
}

.status-pick{display:flex;gap:8px;flex-wrap:wrap;}
.status-pick .s-btn{
  flex:1;min-width:90px;text-align:center;padding:10px 6px;border-radius:9px;
  font-size:12.5px;font-weight:700;cursor:pointer;border:1px solid;
  transition:transform .15s ease, box-shadow .2s ease, filter .15s ease;
}
.status-pick .s-btn:hover{transform:translateY(-2px);filter:brightness(1.15);}
.s-btn.ok{color:var(--green);border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.08);}
.s-btn.ok:hover{box-shadow:0 6px 16px rgba(34,197,94,.25);}
.s-btn.ok.active{background:var(--green);color:#06210f;}
.s-btn.issue{color:var(--amber);border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.08);}
.s-btn.issue:hover{box-shadow:0 6px 16px rgba(245,158,11,.25);}
.s-btn.issue.active{background:var(--amber);color:#241704;}
.s-btn.closed{color:var(--red);border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.08);}
.s-btn.closed:hover{box-shadow:0 6px 16px rgba(239,68,68,.25);}
.s-btn.closed.active{background:var(--red);color:#2a0a0a;}

.form-footer-actions{display:flex;gap:10px;margin-top:8px;}

/* ---------- Toast ---------- */
.toast-wrap{position:fixed;top:18px;right:18px;display:flex;flex-direction:column;gap:10px;z-index:999;}
.toast{
  background:var(--bg-3);border:1px solid var(--border-soft);
  border-left:4px solid var(--green);
  border-radius:10px;padding:12px 16px;font-size:13px;color:var(--text-0);
  box-shadow:0 8px 24px rgba(0,0,0,.5);min-width:240px;
  animation:slideIn .25s ease;
}
.toast.err{border-left-color:var(--red);}
@keyframes slideIn{from{transform:translateX(20px);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  display:none;align-items:center;justify-content:center;z-index:1000;padding:20px;
}
.modal-overlay.show{display:flex;}
.modal-box{
  background:var(--bg-2);border:1px solid var(--border-soft);border-radius:16px;
  width:100%;max-width:420px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.modal-box h3{margin:0 0 10px;font-size:16px;color:var(--text-0);}
.modal-box p{margin:0 0 18px;font-size:13px;color:var(--text-1);line-height:1.6;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;}

.hidden-file{display:none;}

::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#2a3a58;border-radius:6px;}
::-webkit-scrollbar-thumb:hover{background:#37496e;}

.empty-state{padding:30px;text-align:center;color:var(--text-2);font-size:13px;}

/* ---------- Page header ---------- */
.page-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:18px;flex-wrap:wrap;gap:12px;
}
.page-title{font-size:20px;font-weight:800;color:var(--text-0);}
.page-sub{font-size:12.5px;color:var(--text-2);margin-top:3px;}
.page-actions{display:flex;gap:10px;flex-wrap:wrap;}

/* ---------- Filter bar ---------- */
.filter-bar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:var(--bg-2);border:1px solid var(--border-soft);
  border-radius:var(--radius-md);padding:12px 14px;margin-bottom:16px;
}
.filter-bar .search-box{width:200px;}
.filter-group{display:flex;align-items:center;gap:8px;}
.filter-group label{font-size:12px;color:var(--text-2);}
.chip-group{display:flex;gap:6px;flex-wrap:wrap;}
.chip{
  padding:7px 13px;border-radius:20px;font-size:12px;font-weight:600;
  background:var(--bg-3);border:1px solid var(--border-soft);color:var(--text-1);
  cursor:pointer;white-space:nowrap;
  transition:transform .15s ease, box-shadow .2s ease, border-color .2s ease, background .2s ease, color .2s ease;
}
.chip:hover{
  transform:translateY(-2px);color:var(--text-0);
  box-shadow:0 6px 14px rgba(59,130,246,.2);border-color:rgba(59,130,246,.5);
}
.chip.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.chip.active:hover{box-shadow:0 6px 16px rgba(59,130,246,.5);}
.chip.active.f-ok{background:var(--green);border-color:var(--green);color:#06210f;}
.chip.active.f-issue{background:var(--amber);border-color:var(--amber);color:#241704;}
.chip.active.f-closed{background:var(--red);border-color:var(--red);color:#2a0a0a;}

/* ---------- Full page table panel ---------- */
.full-table-panel .table-wrap{max-height:none;}
.summary-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px;}
@media (max-width:1100px){.summary-strip{grid-template-columns:repeat(2,1fr);}}
.summary-box{
  background:var(--bg-2);border:1px solid var(--border-soft);border-radius:var(--radius-md);
  padding:14px 16px;
}
.summary-box .num{font-size:22px;font-weight:800;color:var(--text-0);font-family:"Times New Roman",Times,serif;}
.summary-box .lbl{font-size:11.5px;color:var(--text-2);margin-top:2px;}

/* ---------- Report pages ---------- */
.report-controls{
  display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;
  background:var(--bg-2);border:1px solid var(--border-soft);
  border-radius:var(--radius-md);padding:16px;margin-bottom:18px;
}
.report-controls .field{margin-bottom:0;min-width:160px;}
.report-doc{padding:4px;}
.report-doc-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;padding-bottom:14px;border-bottom:1px dashed var(--border-soft);
}
.report-doc-head .biz{display:flex;align-items:center;gap:12px;}
.report-doc-head .biz-logo{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,#3b82f6,#60a5fa);
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}
.report-doc-head .biz-name{font-size:15px;font-weight:800;color:var(--text-0);}
.report-doc-head .biz-sub{font-size:11.5px;color:var(--text-2);}
.report-doc-head .meta{text-align:right;font-size:12px;color:var(--text-1);}
.report-doc-head .meta b{color:var(--text-0);}

/* Report section headings */
.report-section-title{
  font-size:13px;font-weight:700;color:var(--text-0);
  padding:10px 0 8px;margin:14px 0 10px;
  border-bottom:1px solid var(--border-soft);
  display:flex;align-items:center;gap:6px;
}

/* ---------- Users page ---------- */
.users-grid{display:grid;grid-template-columns:1fr 360px;gap:16px;}
@media (max-width:1300px){.users-grid{grid-template-columns:1fr;}}
.user-row-name{display:flex;align-items:center;gap:10px;}
.user-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;
  background:linear-gradient(135deg,#60a5fa,#3b82f6);color:#fff;
}
.role-badge{
  display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;
}
.role-badge.admin{background:rgba(168,85,247,.15);color:#d8b4fe;}
.role-badge.it{background:rgba(59,130,246,.15);color:#93c5fd;}
.role-badge.manager{background:rgba(34,197,94,.15);color:#86efac;}

/* ---------- Settings page ---------- */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media (max-width:1300px){.settings-grid{grid-template-columns:1fr;}}
.settings-section{margin-bottom:22px;}
.settings-section:last-child{margin-bottom:0;}
.settings-section-title{font-size:13px;font-weight:700;color:var(--text-0);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.logo-picker{display:flex;gap:10px;flex-wrap:wrap;}
.logo-opt{
  width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;border:2px solid transparent;background:var(--bg-3);
}
.logo-opt.active{border-color:var(--blue);}
.danger-zone{
  border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.06);
  border-radius:var(--radius-md);padding:16px;
}
.danger-zone .settings-section-title{color:#fca5a5;}
.settings-actions-row{display:flex;gap:10px;flex-wrap:wrap;}

/* ---------- Login page ---------- */
.login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.login-card{
  width:100%;max-width:400px;
  background:var(--bg-2);border:1px solid var(--border-soft);
  border-radius:var(--radius-lg);padding:36px 32px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.login-brand{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:26px;text-align:center;}
.login-brand-icon{
  width:56px;height:56px;border-radius:16px;
  background:linear-gradient(135deg,#3b82f6,#60a5fa);
  display:flex;align-items:center;justify-content:center;font-size:26px;
}
.login-brand-title{font-size:17px;font-weight:800;color:var(--text-0);}
.login-brand-sub{font-size:12px;color:var(--text-2);}
.login-error{
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.35);
  color:#fca5a5;border-radius:9px;padding:10px 13px;font-size:12.5px;margin-bottom:14px;
}
.login-hint{
  margin-top:18px;padding:12px 14px;border-radius:9px;
  background:var(--bg-3);border:1px solid var(--border-soft);
  font-size:11.5px;color:var(--text-2);line-height:1.7;
}
.login-hint b{color:var(--text-1);}
.security-note{
  display:flex;gap:10px;align-items:flex-start;
  background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);
  border-radius:9px;padding:12px 14px;font-size:11.5px;color:#fcd34d;line-height:1.7;margin-top:16px;
}
.security-note .ic{flex-shrink:0;font-size:15px;}

/* ---------- Permission-disabled controls ---------- */
.icon-mini.is-disabled{opacity:.3;cursor:not-allowed;pointer-events:none;}
.btn.is-disabled{opacity:.4;cursor:not-allowed;pointer-events:none;}
.role-pill{
  display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
  padding:4px 10px;border-radius:20px;background:var(--bg-3);color:var(--text-1);
  border:1px solid var(--border-soft);
}

/* ---------- Dashboard print header ---------- */
.dash-print-head{
  display:none;
  align-items:center;justify-content:space-between;
  padding-bottom:14px;margin-bottom:18px;border-bottom:1px dashed #999;
}
.dash-print-head .biz{display:flex;align-items:center;gap:12px;}
.dash-print-head .biz-logo{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,#3b82f6,#60a5fa);
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}
.dash-print-head .biz-name{font-size:15px;font-weight:800;color:#111;}
.dash-print-head .biz-sub{font-size:11.5px;color:#444;}
.dash-print-head .meta{text-align:right;font-size:12px;color:#333;}
.dash-print-head .meta b{color:#111;}

/* ---------- Print (PDF export) ---------- */
@media print{
  @page{margin:15mm;}
  /* ບັງຄັບໃຫ້ສີພື້ນຫຼັງ/ໄອຄອນທີ່ຕັ້ງໃຈໃຫ້ສະແດງ (ຈຸດສະຖານະ, ແທ່ງກຣາຟ, ໄອຄອນ)
     ພິມອອກມາຈິງ — ບໍ່ຖືກ browser ຕັດອອກໂດຍອັດຕະໂນມັດ (ຄ່າເລີ່ມຕົ້ນ ບໍ່ພິມພື້ນຫຼັງ) */
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;color-adjust:exact !important;}
  /* ---- ສຳຄັນທີ່ສຸດ: ແອັບນີ້ເປັນທີມມືດ (ໂຕໜັງສືສີອ່ອນ/ຂາວເທິງພື້ນມືດ) ----
     ຖ້າບໍ່ບັງຄັບໂຕໜັງສືໃຫ້ເປັນສີເຂັ້ມ, ຕອນພິມພື້ນຫຼັງຈະກາຍເປັນສີຂາວ (ກະດາດ)
     ແຕ່ໂຕໜັງສືຍັງເປັນສີອ່ອນ/ຂາວຄືເກົ່າ = ໂຕໜັງສີຂາວເທິງພື້ນຂາວ = ເບິ່ງບໍ່ເຫັນຫຍັງເລີຍ!
     ນີ້ຄືສາເຫດແທ້ຈິງທີ່ເຮັດໃຫ້ໜ້າພິມເບິ່ງຄືວ່າ "ຫວ່າງເປົ່າ" ທັ້ງທີ່ຂໍ້ມູນຢູ່ຄົບ.
     ບັງຄັບໂຕໜັງສືທັງໝົດໃຫ້ເປັນສີເຂັ້ມກ່ອນເປັນອັນດັບທຳອິດ (ກົດລະດັບຮາກ),
     ກົດທີ່ສະເພາະເຈາະຈົງກວ່າຢູ່ລຸ່ມນີ້ (ເຊັ່ນ .avg-label ສີເທົາອ່ອນ) ຈະຍັງຄຸມໄດ້ຢູ່
     ເພາະ specificity ເທົ່າກັນ ແລະ ຢູ່ຫຼັງກວ່າໃນ CSS ນີ້ */
  body, .app, .app *{ color:#000 !important; }
  body{background:#fff !important;font-family:"Phetsarath OT","Phetsarath","Times New Roman",serif !important;}
  .sidebar,.topbar,.form-panel,.page-head,.filter-bar,.report-controls,
  .toast-wrap,.modal-overlay,.no-print,.login-screen,.sidebar-backdrop{display:none !important;}
  .app,.app.app-2col{grid-template-columns:1fr !important;display:block !important;}
  .main{padding:0 !important;}
  .panel{box-shadow:none !important;border:1px solid #ccc !important;background:#fff !important;}
  .report-doc{color:#111 !important;}
  .report-doc-head{border-bottom:2px solid #333 !important;}
  .report-doc-head .biz-name,.report-doc-head .meta b{color:#111 !important;}
  .report-doc-head .biz-sub,.report-doc-head .meta{color:#444 !important;}
  table{color:#111 !important;}
  thead th{color:#333 !important;border-bottom:1px solid #999 !important;background:#f0f0f0 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  tbody td{color:#222 !important;border-bottom:1px solid #ddd !important;background:#fff !important;}
  tbody tr{background:#fff !important;}
  tbody tr:nth-child(even) td{background:#f8f8f8 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .summary-box{border:1px solid #ccc !important;background:#fff !important;}
  .summary-box .num,.summary-box .lbl{color:#111 !important;}
  .status-dot{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .report-doc .panel-title{color:#111 !important;}
  .report-doc .panel-head{border-bottom:1px solid #ccc !important;}
  .report-section-title{color:#111 !important;border-bottom:1px solid #999 !important;}

  /* ---- ປ້ອງກັນຫົວຕາຕະລາງ/ແຖວຂາດ ຫຼື ຄາບກັນເວລາຂ້າມໜ້າພິມ (ໃຊ້ທຸກໂໝດ) ----
     ໝາຍເຫດ: ຈົງໃຈບໍ່ໃຊ້ break-inside:avoid ຢູ່ລະດັບ "ບລັອກທັງກ້ອນ" (panel/
     building-block) ອີກຕໍ່ໄປ ເພາະຖ້າບລັອກນັ້ນສູງກວ່າ 1 ໜ້າພິມ (ເຊັ່ນຕາຕະລາງ
     9+ ແຖວ) ຈະຊົນກັບບັນຫາທີ່ຮູ້ກັນຂອງ Chrome print engine ທີ່ບາງຄັ້ງແຊກ
     ໜ້າເປົ່າແທນທີ່ຈະຍອມແຕກບລັອກນັ້ນ — ຈຶ່ງປ້ອງກັນສະເພາະລະດັບ "ແຖວ" ແທນ
     ເຊິ່ງແຖວດຽວບໍ່ມີທາງສູງກວ່າ 1 ໜ້າພິມ ຈຶ່ງບໍ່ມີບັນຫານີ້ */
  .report-section-title{ break-after: avoid; page-break-after: avoid; }
  .summary-strip{ break-inside: avoid; page-break-inside: avoid; }
  table thead{ display: table-header-group; }
  table tfoot{ display: table-footer-group; }
  tbody tr{ break-inside: avoid; page-break-inside: avoid; }

  /* Dashboard-as-PDF export */
  .dash-print-head{display:flex !important;}
  .panel-title{color:#111 !important;}
  .panel-head{border-bottom:1px solid #ccc !important;}
  .kpi-card{border:1px solid #ccc !important;background:#fff !important;box-shadow:none !important;}
  .kpi-label,.kpi-label-amber{color:#444 !important;}
  .kpi-value{color:#111 !important;}
  .kpi-value .unit{color:#555 !important;}
  .kpi-delta.up,.kpi-delta.down{color:#555 !important;}

  /* ---- Dashboard PDF: ພິມຕາມລຳດັບ DOM ຈິງ (KPI→ຕາຕະລາງ→ກຣາຟ→ສະຫຼຸບ) ----
     ໝາຍເຫດ: ເຄີຍລອງໃຊ້ flex+order ເພື່ອຈັດລຳດັບໃໝ່ສະເພາະຕອນພິມ ແຕ່ພົບວ່າ
     ການປະສົມ display:flex ກັບ forced page-break ເຮັດໃຫ້ browser ບາງໂປຣແກຣມ
     ແຊກໜ້າເປົ່າແຊກກາງມາໂດຍບໍ່ຄາດຝັນ (ບັນຫາທີ່ຮູ້ກັນຂອງ print+flexbox) —
     ຈຶ່ງຕັດອອກ ເພື່ອຄວາມໜ້າເຊື່ອຖືຂອງໜ້າພິມ 100% */

  /* ============================================================
     ໂໝດ "ແຍກຄົນລະໜ້າ" (print-separate — ຄ່າເລີ່ມຕົ້ນ):
     ແຕ່ລະບລັອກ (ກຣາຟ, Top5/ສະເລ່ຍ, Hotel, Resident, ຕາຕະລາງ/ບລັອກລາຍງານ)
     ຂຶ້ນໜ້າເຈ້ຍໃໝ່ຂອງມັນເອງສະເໝີ — ໜ້າຫຼາຍຂຶ້ນ ແຕ່ຮັບປະກັນ 100% ບໍ່ຂາດ/ຄາບ
     ============================================================ */
  .app.print-separate .dash-sec-charts .panel,
  .app.print-separate .dash-sec-bottom .panel,
  .app.print-separate .dash-sec-tables .panel,
  .app.print-separate .report-building-block,
  .app.print-separate .report-subsection{
    break-before: page; page-break-before: always;
  }

  /* ============================================================
     ໂໝດ "ໄຫຼຕາມພື້ນທີ່" (print-flow):
     ຫຼາຍບລັອກຈະຢູ່ໜ້າດຽວກັນຖ້າພື້ນທີ່ພໍ (ປະຫຍັດເຈ້ຍ) — ຍັງປ້ອງກັນ
     ການຕັດເຄິ່ງກາງດ້ວຍ break-inside:avoid ຂ້າງເທິງຄືເກົ່າ
     ============================================================ */
  .app.print-flow .dash-sec-charts .panel,
  .app.print-flow .dash-sec-bottom .panel,
  .app.print-flow .dash-sec-tables .panel,
  .app.print-flow .report-building-block,
  .app.print-flow .report-subsection{
    break-before: auto; page-break-before: auto;
  }

  .code-link{color:#1d4ed8 !important;}
  .legend-row{color:#333 !important;}
  .donut-legend-item{color:#333 !important;}
  .donut-legend-item b{color:#111 !important;}
  .bar-rank{color:#333 !important;}
  .bar-count{color:#666 !important;}
  .bar-track{background:#e5e7eb !important;}
  .avg-value{color:#111 !important;}
  .avg-label{color:#666 !important;}
  .avg-cta{display:none !important;}
  .row-actions{display:none !important;}
  .panel-actions{display:none !important;}
  .select-mini{display:none !important;}
  thead th:last-child{display:none !important;}
  tbody td:last-child{display:none !important;}
  .table-footer{color:#555 !important;border-top:1px solid #ddd;}
  .pager{display:none !important;}
}

/* ---------- Sidebar backdrop (mobile drawer overlay) ---------- */
.sidebar-backdrop{ display:none; }

@media (max-width:1100px){
  .app{grid-template-columns:1fr !important;}
  .app.app-2col{grid-template-columns:1fr !important;}
  .app.form-panel-collapsed{grid-template-columns:1fr !important;}

  /* ---- ເມນູຂ້າງກາຍເປັນລິ້ນຊັກເລື່ອນ (drawer) ລອຍທັບໜ້າຈໍ ----
     ແທນທີ່ຈະຖືກຕີບເປັນຄໍລຳ grid ແບບ desktop, ຢູ່ tablet/mobile
     ມັນຈະລອຍທັບເນື້ອໃນ ແລະ ເລື່ອນເຂົ້າ-ອອກຕາມປຸ່ມ ☰ */
  .sidebar{
    position:fixed; top:0; left:0; z-index:300;
    width:270px; max-width:82vw; height:100vh;
    transform:translateX(-100%);
    transition:transform .25s ease;
    box-shadow:10px 0 34px rgba(0,0,0,.5);
  }
  .app:not(.sidebar-collapsed) .sidebar{ transform:translateX(0); }

  .app:not(.sidebar-collapsed) .sidebar-backdrop{
    display:block; position:fixed; inset:0; z-index:250;
    background:rgba(0,0,0,.55);
  }

  .form-panel{position:relative;height:auto;}
}

/* ---------- Collapsible sidebar ---------- */
.app.sidebar-collapsed{grid-template-columns:0px 1fr 380px;}
.app.sidebar-collapsed.app-2col{grid-template-columns:0px 1fr;}
.app.sidebar-collapsed .sidebar{
  width:0;padding-left:0;padding-right:0;overflow:hidden;border-right:none;
}
@media (max-width:1400px){
  .app.sidebar-collapsed{grid-template-columns:0px 1fr 340px;}
}

/* ---------- Collapsible form (add-data) panel ---------- */
.form-panel-toggle{
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;padding:6px 2px 14px;margin-bottom:4px;
  border-bottom:1px solid var(--border-soft);
}
.form-panel-arrow{color:var(--text-2);font-size:13px;}
.app.form-panel-collapsed{grid-template-columns:240px 1fr 64px;}
@media (max-width:1400px){
  .app.form-panel-collapsed{grid-template-columns:220px 1fr 64px;}
}
.app.form-panel-collapsed .form-panel{
  padding:20px 10px;display:flex;flex-direction:column;align-items:center;
}
.app.form-panel-collapsed .form-panel-toggle{
  writing-mode:vertical-rl;border-bottom:none;justify-content:flex-start;gap:10px;
}
.app.form-panel-collapsed .form-panel-toggle .form-title span:last-child{display:none;}
.app.form-panel-collapsed .form-panel-arrow{writing-mode:horizontal-tb;}

/* ---------- Speedtest.net external link (form panel) ---------- */
.speedtest-block{
  background:var(--bg-3);border:1px solid var(--border-soft);
  border-radius:var(--radius-md);padding:12px 14px;margin-bottom:16px;
  text-align:center;
}
.speedtest-external-btn{ text-decoration:none; display:block; }
.speedtest-hint{
  font-size:10.5px;color:var(--text-2);margin-top:8px;line-height:1.5;
}

/* ---------- Logo upload (settings) ---------- */
.logo-upload-row{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.logo-preview{
  width:56px;height:56px;border-radius:14px;overflow:hidden;flex-shrink:0;
  background:var(--bg-3);border:1px solid var(--border-soft);
  display:flex;align-items:center;justify-content:center;font-size:24px;
}
.logo-preview img{width:100%;height:100%;object-fit:cover;}

/* ============================================================
   Responsive polish — PC / Notebook / Tablet (iPad) / Mobile
   ============================================================ */

/* ---- Tablet (iPad ຕັ້ງ, ຈໍນ້ອຍ 900px ລົງ) ---- */
@media (max-width:900px){
  .topbar{padding:12px 16px;flex-wrap:wrap;row-gap:10px;}
  .page-head{flex-wrap:wrap;row-gap:10px;}
  .page-actions{flex-wrap:wrap;}
  .report-controls{flex-wrap:wrap;}
  .filter-bar{flex-wrap:wrap;row-gap:8px;}
  .main{padding:16px !important;}
  .kpi-row{grid-template-columns:repeat(2,1fr) !important;}
  .avg-grid{grid-template-columns:repeat(2,1fr) !important;}
}

/* ---- ມືຖື (Mobile, 640px ລົງ) ---- */
@media (max-width:640px){
  .brand-title{font-size:14px;}
  .main{padding:12px !important;}
  .topbar{padding:10px 12px;gap:8px;}
  .panel{padding:14px !important;}
  .kpi-row{grid-template-columns:1fr !important;gap:10px;}
  .avg-grid{grid-template-columns:1fr !important;}
  .summary-strip{grid-template-columns:repeat(2,1fr) !important;}
  table{font-size:11.5px !important;}
  .table-wrap{-webkit-overflow-scrolling:touch;}
  .modal-box{width:92vw;max-width:360px;padding:20px;}
  .date-pill{padding:7px 10px;font-size:12px;}
  .profile-name,.profile-role{display:none;}
  .chip{padding:6px 10px;font-size:11.5px;}
  .btn{padding:10px 14px;font-size:13px;}
  .page-title{font-size:18px !important;}
}

/* ---- ຮັບປະກັນຈຸດແຕະ (tap targets) ໃຫຍ່ພໍໃນທຸກໜ້າຈໍລະບົບສຳຜັດ ---- */
@media (max-width:1100px){
  .icon-btn,.burger{width:42px;height:42px;}
  .pager-btn{min-width:36px;min-height:36px;}
  .stepper-btn{min-width:38px;}
  .nav-item{padding:12px 10px;}
  .chip,.toggle-btn{min-height:38px;display:inline-flex;align-items:center;}
  input,select,textarea,.input{min-height:42px;}
  .btn{min-height:42px;}
}

/* ---- ຈໍນ້ອຍທີ່ສຸດ (ໂທລະສັບຂະໜາດນ້ອຍ, ≤380px) ---- */
@media (max-width:380px){
  .main{padding:10px !important;}
  .topbar{padding:8px 10px;}
  .panel{padding:12px !important;}
  .kpi-value{font-size:20px !important;}
  .btn{padding:9px 12px;font-size:12.5px;}
  .form-panel{padding:16px 12px;}
  .sidebar{width:88vw;}
}
</style>
</head>
